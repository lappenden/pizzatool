<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- rounded background — matches the header dark green -->
  <rect width="64" height="64" rx="14" fill="#1B3A2E"/>

  <!-- subtle inner highlight for depth -->
  <rect x="0" y="0" width="64" height="32" rx="14" fill="#FFFFFF" opacity="0.04"/>

  <!-- pizza slice centered with padding -->
  <g transform="translate(0, 3)">
    <!-- crust outer rim -->
    <path d="M10 18 Q32 6 54 18 L50 23 Q32 12 14 23 Z" fill="#A07A4F"/>

    <!-- crust top (tan) -->
    <path d="M11 19 Q32 8 53 19 L49 23 Q32 14 15 23 Z" fill="#D9B681"/>

    <!-- sauce -->
    <path d="M14 23 Q32 13 50 23 L32 55 Z" fill="#E15A3F"/>

    <!-- cheese tint -->
    <path d="M16 25 Q32 15 48 25 L32 52 Z" fill="#FFE39A" opacity="0.6"/>

    <!-- pepperoni -->
    <circle cx="23" cy="29" r="3.2" fill="#C13A2C"/>
    <circle cx="41" cy="30" r="3.2" fill="#C13A2C"/>
    <circle cx="32" cy="42" r="2.8" fill="#C13A2C"/>

    <!-- pepperoni highlights -->
    <circle cx="22" cy="28" r="0.9" fill="#E76050" opacity="0.75"/>
    <circle cx="40" cy="29" r="0.9" fill="#E76050" opacity="0.75"/>
    <circle cx="31" cy="41" r="0.8" fill="#E76050" opacity="0.75"/>

    <!-- basil dots -->
    <ellipse cx="32" cy="22" rx="1.3" ry="0.8" fill="#5C8B3F"/>
    <ellipse cx="27" cy="46" rx="1" ry="0.7" fill="#5C8B3F"/>
  </g>
</svg>
